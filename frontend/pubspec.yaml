name: tilawah_app
description: Tilawah - Premium Quran Recitation & Learning App with AI Correction
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP & API
  dio: ^5.4.3

  # WebSocket
  web_socket_channel: ^2.4.0

  # Audio
  record: ^6.2.1
  just_audio: ^0.9.40

  # Permissions
  permission_handler: ^11.3.1

  # Location / Qibla
  geolocator: ^12.0.0
  flutter_compass: ^0.8.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Local Storage & Security
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.2.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/quran_complete.json
  fonts:
    - family: Scheherazade
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
          weight: 400
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
