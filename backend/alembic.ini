# Tilawah AI — Alembic Configuration
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = alembic
prepend_sys_path = .

# The SQLAlchemy URL is loaded dynamically in env.py from app.core.config
# sqlalchemy.url is intentionally left blank here.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
